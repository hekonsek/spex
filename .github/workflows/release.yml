name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump minor version
        id: version
        run: |
          npm version minor
          echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Update README version
        run: |
          version="${{ steps.version.outputs.tag }}"
          version="${version#v}"
          perl -0pi -e "s#(github\.com/hekonsek/spex/releases/download/v)\d+\.\d+\.\d+(/spex-)\d+\.\d+\.\d+(\.tgz)#\${1}$version\${2}$version\${3}#g" README.md
          git add README.md
          git diff --cached --quiet || git commit -m "Update README version to ${{ steps.version.outputs.tag }}"

      - name: Build
        run: npm run build

      - name: Pack npm artifact
        id: pack
        run: |
          package_file="$(npm pack)"
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" "${{ steps.pack.outputs.package_file }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
